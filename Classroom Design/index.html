<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Board</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Language Toggle -->
    <div class="lang-toggle">
        <span id="langUrdu" class="active">اردو</span>
        <label class="switch">
            <input type="checkbox" id="langSwitch" onchange="toggleLanguage()">
            <span class="slider round"></span>
        </label>
        <span id="langEnglish">English</span>
    </div>

    <!-- Score Board -->
    <div id="scoreBoard" class="score-board"><span id="scoreLabel">اسکور:</span> <span id="scoreValue">0</span></div>

    <div class="container">
        <div class="teacher">
            <div id="speechBubble" class="speech-bubble">ہیلو! آئیے مل کر سیکھیں!</div>
            <img id="teacherImg" src="./media/middle.png" alt="Teacher">
        </div>

        <div class="board">
            <div class="box" id="englishBox" data-subject="english" onmouseover="changeTeacher('up', 'english')"
                onmouseleave="resetTeacher()">
                انگریزی
            </div>

            <div class="box" id="urduBox" data-subject="urdu" onmouseover="changeTeacher('middle', 'urdu')"
                onmouseleave="resetTeacher()">
                اردو
            </div>

            <div class="box" id="mathsBox" data-subject="maths" onmouseover="changeTeacher('down', 'maths')"
                onmouseleave="resetTeacher()">
                ریاضی
            </div>
        </div>
    </div>

    <!-- Decorative Elements -->
    <div class="decor plant-left">
        <div class="flower"></div>
        <div class="leaf"></div>
    </div>



    <div class="butterfly">
        <div class="wing left"></div>
        <div class="wing right"></div>
    </div>

    <!-- Dustbin -->
    <div id="dustbin" class="dustbin">
        <div class="icon">🗑️</div>
    </div>

    <!-- Paper Balls -->
    <div class="paper-ball" id="paper1" style="bottom: 15%; left: 15%;"></div>
    <div class="paper-ball" id="paper2" style="bottom: 8%; left: 45%;"></div>
    <div class="paper-ball" id="paper3" style="bottom: 12%; left: 75%;"></div>

    <script src="script.js"></script>
</body>

</html>
